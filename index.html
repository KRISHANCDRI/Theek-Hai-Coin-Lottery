<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Theek Hai Coin Lottery</title>
  <script src="https://unpkg.com/@solana/web3.js@1.91.5/lib/index.iife.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #f0f4f8; margin: 0; padding: 0;}
    .container { max-width: 400px; margin: 50px auto; background: white; border-radius: 20px; box-shadow: 0 4px 20px #0001; padding: 32px; text-align: center;}
    .btn { padding: 12px 24px; background: #8247e5; color: white; border: none; border-radius: 10px; font-size: 18px; cursor: pointer;}
    .btn:disabled { background: #c5b0ee;}
    .wallet { margin: 18px 0 36px 0; }
    .info { font-size: 15px; margin: 10px 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Theek Hai Coin Lottery</h1>
    <div id="wallet" class="wallet"></div>
    <div id="status" class="info"></div>
    <button class="btn" id="connectBtn">Connect Phantom Wallet</button>
    <button class="btn" id="joinBtn" style="margin-top:20px; display:none;">Join Lottery for $10 in TH COIN</button>
    <div style="margin-top:20px; font-size:13px; color:#666;">
      <b>Lottery Pool Address:</b><br>
      DkfuWLCfnbNjb3EnBCttjExGar7AK78SuNNj8xZNSNLj
    </div>
  </div>
  <script>
    // Set your TH COIN mint address here
    const TH_COIN_MINT = 'PASTE_YOUR_TOKEN_MINT_ADDRESS_HERE';
    // Theek Lottery wallet address
    const LOTTERY_ADDRESS = 'DkfuWLCfnbNjb3EnBCttjExGar7AK78SuNNj8xZNSNLj';
    // Entry amount in TH COIN (adjust for decimals, e.g. 10e9 for 9 decimals)
    const ENTRY_AMOUNT = 10; // This is in "full tokens", not lamports!

    const connectBtn = document.getElementById('connectBtn');
    const joinBtn = document.getElementById('joinBtn');
    const walletDiv = document.getElementById('wallet');
    const statusDiv = document.getElementById('status');

    let provider = null;
    let publicKey = null;

    // Phantom wallet detection
    function getProvider() {
      if ('solana' in window) {
        const provider = window.solana;
        if (provider.isPhantom) return provider;
      }
      window.open('https://phantom.app/', '_blank');
    }

    // Connect Phantom
    connectBtn.onclick = async () => {
      provider = getProvider();
      if (!provider) return;
      try {
        const resp = await provider.connect();
        publicKey = resp.publicKey.toString();
        walletDiv.textContent = 'Wallet: ' + publicKey.slice(0,6) + '...' + publicKey.slice(-6);
        connectBtn.style.display = 'none';
        joinBtn.style.display = '';
        statusDiv.textContent = '';
      } catch (err) {
        statusDiv.textContent = 'Connection cancelled.';
      }
    };

    // Join Lottery (placeholder for SPL token transfer)
    joinBtn.onclick = async () => {
      if (!publicKey) return alert('Connect wallet first!');
      joinBtn.disabled = true;
      statusDiv.textContent = 'Sending $10 TH COIN (simulated)...';

      // ------- PLACEHOLDER -------
      // Here you would implement actual SPL token transfer code!
      // For now, just simulate:
      setTimeout(() => {
        statusDiv.textContent = 'Success! You have joined the lottery. Your entry is on the blockchain.';
        joinBtn.disabled = false;
      }, 1800);

      // If you want the actual SPL transfer logic, I can write it next!
    };
  </script>
</body>
</html>
