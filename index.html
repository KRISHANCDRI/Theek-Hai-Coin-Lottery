<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Theek Hai Coin Lottery</title>
  <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>
  <script src="https://unpkg.com/@solana/spl-token@latest/lib/index.iife.js"></script>
  <style>
    body {
      font-family: sans-serif;
      padding: 2em;
      text-align: center;
    }
    button {
      padding: 0.75em 1.5em;
      font-size: 1em;
      background-color: #7e3ff2;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 1em;
    }
  </style>
</head>
<body>
  <h1>Theek Hai Coin <br/>Lottery</h1>
  <p id="wallet-address">Wallet: Not Connected</p>
  <p id="error-msg" style="color: red;"></p>
  <button onclick="joinLottery()">Join Lottery for $10 in TH COIN</button>
  <p style="margin-top: 2em;">
    <strong>Lottery Pool Address:</strong><br/>
    DkfuWLCfnbNjb3EnBCttjExGar7AK78SuNNj8xZNSNLj
  </p>

  <script>
    const { Connection, PublicKey, clusterApiUrl, Transaction } = solanaWeb3;
    const {
      getAssociatedTokenAddress,
      createTransferInstruction,
      getAccount,
      TOKEN_PROGRAM_ID
    } = splToken;

    const connection = new Connection(clusterApiUrl("devnet"), "confirmed");
    const TOKEN_MINT = new PublicKey("PUT_YOUR_THCOIN_MINT_HERE"); // <-- Replace this with actual token mint address
    const LOTTERY_POOL = new PublicKey("DkfuWLCfnbNjb3EnBCttjExGar7AK78SuNNj8xZNSNLj");
    let userPublicKey = null;

    // Auto-connect on load
    window.addEventListener("load", async () => {
      if (window.solana && window.solana.isPhantom) {
        try {
          const resp = await window.solana.connect();
          userPublicKey = resp.publicKey;
          document.getElementById("wallet-address").innerText =
            "Wallet: " + userPublicKey.toBase58().slice(0, 6) + "..." +
            userPublicKey.toBase58().slice(-6);
        } catch (err) {
          console.error("Wallet connection failed", err);
        }
      } else {
        alert("Phantom wallet not detected!");
      }
    });

    async function joinLottery() {
      try {
        const userTokenAccount = await getAssociatedTokenAddress(
          TOKEN_MINT,
          userPublicKey
        );

        const poolTokenAccount = await getAssociatedTokenAddress(
          TOKEN_MINT,
          LOTTERY_POOL
        );

        const ix = createTransferInstruction(
          userTokenAccount,
          poolTokenAccount,
          userPublicKey,
          10_000_000 // Adjust for 6 decimal tokens = 10 THCOIN
        );

        const tx = new Transaction().add(ix);
        tx.feePayer = userPublicKey;

        const { blockhash } = await connection.getLatestBlockhash();
        tx.recentBlockhash = blockhash;

        const signed = await window.solana.signTransaction(tx);
        const sig = await connection.sendRawTransaction(signed.serialize());
        await connection.confirmTransaction(sig, "confirmed");

        alert("You have joined the lottery!");
      } catch (err) {
        console.error(err);
        document.getElementById("error-msg").innerText = "Error: " + err.message;
      }
    }
  </script>
</body>
</html>
