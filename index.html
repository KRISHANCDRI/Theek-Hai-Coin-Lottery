<script src="https://unpkg.com/@solana/web3.js@1.91.5/lib/index.iife.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@solana/spl-token@0.5.0/lib/index.iife.js"></script>
<script>
  // Your real addresses:
  const TH_COIN_MINT = '8cHTywDEarRcKdBTndHgPnSGANVnGNDbmc7dDVhkpump';
  const LOTTERY_ADDRESS = 'DkfuWLCfnbNjb3EnBCttjExGar7AK78SuNNj8xZNSNLj';
  const ENTRY_AMOUNT = 10; // $10 worth of TH COIN (full coins, not lamports)

  const connectBtn = document.getElementById('connectBtn');
  const joinBtn = document.getElementById('joinBtn');
  const walletDiv = document.getElementById('wallet');
  const statusDiv = document.getElementById('status');

  let provider = null;
  let publicKey = null;

  function getProvider() {
    if ('solana' in window) {
      const provider = window.solana;
      if (provider.isPhantom) return provider;
    }
    window.open('https://phantom.app/', '_blank');
  }

  connectBtn.onclick = async () => {
    provider = getProvider();
    if (!provider) return;
    try {
      const resp = await provider.connect();
      publicKey = resp.publicKey.toString();
      walletDiv.textContent = 'Wallet: ' + publicKey.slice(0,6) + '...' + publicKey.slice(-6);
      connectBtn.style.display = 'none';
      joinBtn.style.display = '';
      statusDiv.textContent = '';
    } catch (err) {
      statusDiv.textContent = 'Connection cancelled.';
    }
  };

  joinBtn.onclick = async () => {
    if (!publicKey) return alert('Connect wallet first!');
    joinBtn.disabled = true;
    statusDiv.textContent = 'Preparing transaction...';

    try {
      const connection = new solanaWeb3.Connection('https://api.mainnet-beta.solana.com');
      const fromWallet = new solanaWeb3.PublicKey(publicKey);
      const toWallet = new solanaWeb3.PublicKey(LOTTERY_ADDRESS);
      const mint = new solanaWeb3.PublicKey(TH_COIN_MINT);

      // Get or create associated token accounts
      const fromTokenAccount = await splToken.Token.getAssociatedTokenAddress(
        splToken.ASSOCIATED_TOKEN_PROGRAM_ID,
        splToken.TOKEN_PROGRAM_ID,
        mint,
        fromWallet
      );
      const toTokenAccount = await splToken.Token.getAssociatedTokenAddress(
        splToken.ASSOCIATED_TOKEN_PROGRAM_ID,
        splToken.TOKEN_PROGRAM_ID,
        mint,
        toWallet
      );

      // 9 decimals for SPL tokens
      const amountToSend = ENTRY_AMOUNT * (10 ** 9);

      // Build transfer instruction
      const ix = splToken.Token.createTransferInstruction(
        splToken.TOKEN_PROGRAM_ID,
        fromTokenAccount,
        toTokenAccount,
        fromWallet,
        [],
        amountToSend
      );

      // Create and send transaction
      const transaction = new solanaWeb3.Transaction().add(ix);

      transaction.feePayer = fromWallet;
      let { blockhash } = await connection.getRecentBlockhash();
      transaction.recentBlockhash = blockhash;

      let signed = await provider.signTransaction(transaction);
      let signature = await connection.sendRawTransaction(signed.serialize());

      statusDiv.textContent = 'Sent! Confirming on blockchain...';

      await connection.confirmTransaction(signature, 'confirmed');

      statusDiv.innerHTML = `Success! <a href="https://explorer.solana.com/tx/${signature}" target="_blank">View transaction</a>`;
    } catch (e) {
      statusDiv.textContent = "Error: " + (e.message || e);
    }
    joinBtn.disabled = false;
  };
</script>
